asyncapi: 3.0.0

info:
  title: Nexus Production WebSocket API
  version: 2.0.0
  description: |
    외부 client 가 사용하는 production WebSocket 채널 — Nexus(`:59100`) 가 단독 제공. 양방향 — server push (envelope v2) + client inbound action.

    - client WebSocket 은 전부 Nexus 소유 (ws_manager / event_mapper / ws_inbound). DRO 는 client WS 를 제공하지 않음.
    - DRO 는 단일 internal 포트 `59200` 에서 `POST /control/spawn` + `POST /control/output`(IOM→DOCX) + per-session SSE 만 제공 (client WS 없음).
    - 봉투 = `{type, timestamp, seq, data}` (scope/subject_id 없음 — 연결이 work별). 모든 `type` 은 `<domain>.<event>` 네임스페이스(bare 금지): `message.*`(대화) · `work.*`(엔진 활동) · `model.*` · `output.*` · `system.*`(인프라).
    - 이벤트는 **best-effort 알림** — 진실은 CM(Context Manager) 영속 상태. 누락/순서역전 시 client 가 REST(`thread/messages`·`estimate/*` 등) refresh 로 복구한다. 재연결 `?since_seq=N` replay 는 보강일 뿐 전달·순서 보장 아님.
    - heartbeat 는 native WebSocket ping/pong (control frame) — app-level 이벤트 없음.
    - 메타 요구사항: AI 비식별 — 내부 역할·모델·실행 단위 식별자는 외부 표면에 노출하지 않는다. 행위 중심 라벨 (`support`/`analysis`/...) 만 사용.

    표면 명세 source of truth: 본 파일 + `@contracts/00.dro/websocket-events.json`. 채널 라벨 매핑 single source 는 서버 측 한 곳(Nexus 가 내부 RAW event → channel 라벨 변환).
  contact:
    name: Nexus Backend Team
  tags:
    - name: production
    - name: nexus

defaultContentType: application/json

servers:
  nexus_production:
    host: "nexus:59100"
    pathname: /api/v1/works/{work_id}/thread/stream
    protocol: ws
    title: Nexus Production WebSocket
    summary: 외부 client 채널 — server push (envelope v2) + client inbound action
    security:
      - $ref: "#/components/securitySchemes/cookieAuth"
    description: |
      인증: httpOnly 쿠키 `nx_access` 가 handshake(HTTP upgrade)에 **자동 첨부** — WebSocket 은 Authorization 헤더가 없으나 same-origin 쿠키는 전송됨. 클라가 토큰을 직접 다루지 않음(JS 미접근).
      user_id 는 경로에 없음 — Nexus 가 쿠키 토큰에서 해석(위조 불가). AUTH_MODE=OPEN 이면 쿠키 없이 고정 user_id, SECURE 면 검증 실패 시 close 4401.
      서버는 handshake 를 먼저 수락(accept)한 뒤 4401/4404 Close 프레임을 보낸다 — upgrade 단계에서 거부하지 않아 브라우저가 close code 를 관측할 수 있다.
      정기 수명(12h cap) 도달은 `1001`(going-away, RFC)로 close — 같은 토큰으로 재연결하면 된다(인증 실패 4401 과 구분).
      현재 runtime 은 `since_seq>0`일 때만 replay를 시도하며 seq>N 이벤트를 보낸다. `since_seq=0`은 fresh connect와 동일하다.
      ring buffer maxlen 200 per `(user_id, work_id)` — buffer evict / 빈 버퍼 재연결 / seq reset 시 `system.resync_required` push.
      마지막 연결 해제 시 key를 GC하므로 일반적인 단일 connection 재연결은 replay가 아니라 resync 대상이다.
      인증 실패·token expiry는 4401, 없는/접근불가 work는 4404, 정기 12h 수명 cap 도달은 1001(going-away)로 close한다.
    variables:
      work_id:
        description: work UUID. user_id 는 nx_access 쿠키에서 server 해석.

channels:
  work_session:
    address: /api/v1/works/{work_id}/thread/stream
    title: work 세션 양방향 WS 채널
    parameters:
      work_id:
        description: work UUID (user_id 는 경로에 없음 — nx_access 쿠키에서 해석)
    bindings:
      ws:
        method: GET
        query:
          type: object
          additionalProperties: false
          properties:
            since_seq:
              type: integer
              minimum: 0
              default: 0
              description: 현재 runtime에서 0은 replay를 요청하지 않으며, 양수 N은 seq>N replay를 요청한다.
        headers:
          type: object
          properties:
            Cookie:
              type: string
              description: SECURE 모드에서 `nx_access=<JWT>` (httpOnly, handshake 에 자동 첨부). 브라우저가 직접 다루지 않음.
        bindingVersion: 0.1.0
    messages:
      # ─── outbound (server → client, envelope v2 — 9종) ──────────────────
      MessageReceived:
        $ref: "#/components/messages/MessageReceived"
      MessageReply:
        $ref: "#/components/messages/MessageReply"
      WorkProgress:
        $ref: "#/components/messages/WorkProgress"
      WorkFailed:
        $ref: "#/components/messages/WorkFailed"
      ModelMaturity:
        $ref: "#/components/messages/ModelMaturity"
      ModelRoadmap:
        $ref: "#/components/messages/ModelRoadmap"
      OutputReady:
        $ref: "#/components/messages/OutputReady"
      SystemResyncRequired:
        $ref: "#/components/messages/SystemResyncRequired"
      SystemError:
        $ref: "#/components/messages/SystemError"
      # ─── inbound (client → server, action-based — 1종, 멱등 send) ──────────
      ActionMessageSend:
        $ref: "#/components/messages/ActionMessageSend"

operations:
  # ─── server → client (receive) ─────────────────────────────────────────
  receiveBusinessEvents:
    title: 비즈니스 이벤트 수신 (server push)
    summary: server 가 클라이언트로 push 하는 모든 비즈니스 / 시스템 이벤트
    action: receive
    channel:
      $ref: "#/channels/work_session"
    messages:
      - $ref: "#/channels/work_session/messages/MessageReceived"
      - $ref: "#/channels/work_session/messages/MessageReply"
      - $ref: "#/channels/work_session/messages/WorkProgress"
      - $ref: "#/channels/work_session/messages/WorkFailed"
      - $ref: "#/channels/work_session/messages/ModelMaturity"
      - $ref: "#/channels/work_session/messages/ModelRoadmap"
      - $ref: "#/channels/work_session/messages/OutputReady"
      - $ref: "#/channels/work_session/messages/SystemResyncRequired"
      - $ref: "#/channels/work_session/messages/SystemError"

  # ─── client → server (send) ─────────────────────────────────────────
  sendUserActions:
    title: 사용자 action 송신 (client inbound)
    summary: client 가 Nexus(ws_inbound) 에 송신하는 inbound action — 멱등 텍스트 메시지(message.send). 재시도는 같은 correlation_id 로 재송신(별도 resend 액션 없음).
    action: send
    channel:
      $ref: "#/channels/work_session"
    messages:
      - $ref: "#/channels/work_session/messages/ActionMessageSend"

components:
  securitySchemes:
    cookieAuth:
      type: httpApiKey
      in: cookie
      name: nx_access
      description: |
        httpOnly access 쿠키 `nx_access` (JS 미접근). WebSocket handshake(HTTP upgrade)에 same-origin 으로 자동 첨부 — Authorization 헤더 불필요.
        AUTH_MODE=OPEN 이면 쿠키 없이 고정 user_id, SECURE 면 필수 (검증 실패 시 close 4401). REST openapi 의 cookie 스킴과 동일 토큰.

  schemas:
    EnvelopeBase:
      type: object
      description: server push envelope v2 공통 헤더 — type/timestamp/seq/data (scope·subject_id 없음, 연결이 work별).
      required: [type, timestamp, seq, data]
      additionalProperties: false
      properties:
        type:
          type: string
        timestamp:
          type: string
          format: date-time
        seq:
          type: integer
          minimum: 0
          description: broadcast 이벤트의 (user_id, work_id) 별 monotonic — 재연결 since_seq replay key (순서 보장 아님 — best-effort). unicast ack/error(message.received·system.error·system.resync_required)는 replay 버퍼 미적재·`seq=0` sentinel (replay 스트림 아님 — 클라는 since_seq 비교 대상에서 제외).
        data:
          type: object

    DisplayStatus:
      type: object
      required: [ko]
      additionalProperties: false
      properties:
        ko: { type: string }
        en: { type: string }

    Channel:
      type: string
      description: |
        작업 진행 채널 라벨 (lane 식별). enum 은 baseline 6값 — 라벨 매핑 single source 는 서버 측 한 곳.
        메타 (AI 비식별) — 내부 역할·모델 식별자 노출 금지, 행위 중심 라벨만.
      enum: [support, analysis, research, thinking, drafting, review]

    ErrorCode:
      type: string
      description: 공유 에러 코드 (REST openapi 와 동일 어휘). 원천 = shared/venezia_contracts/models/dro_api/error.py. `rate_limited`(내부 503 포화 — DRO 재시도라 client 미도달) 와 `pipeline_ambiguous`/`pipeline_unknown`(내부 디버그 전용) 은 client 표면에 도달하지 않는다.
      enum:
        - unauthorized
        - not_found
        - validation_failed
        - conflict
        - precondition_required
        - rate_limited
        - internal
        - not_implemented
        - pipeline_ambiguous
        - pipeline_unknown
        - work_not_found
        - document_not_ready
        - content_not_ready

    ErrorBody:
      type: object
      required: [code, message]
      additionalProperties: false
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message: { type: string }

  messages:
    # ============================================================
    # Outbound (server → client) — envelope v2
    # ============================================================
    MessageReceived:
      name: MessageReceived
      title: 메시지 acceptance ack
      summary: 송신 소켓에만 보내는 server acceptance ack. data 에 클라 correlation_id(echo) 와 저장된 user turn 의 메시지 id 를 동봉한다. 같은 correlation_id 재send 면 원결과를 그대로 재-ack(새 turn 없음). 후속 처리 완료 보장은 아니다.
      contentType: application/json
      payload:
        allOf:
          - $ref: "#/components/schemas/EnvelopeBase"
          - type: object
            properties:
              type: { const: message.received }
              data:
                type: object
                additionalProperties: false
                required: [correlation_id, id]
                properties:
                  correlation_id: { type: string, description: "클라가 message.send 에 실은 멱등키 — ack 가 echo." }
                  id: { type: [integer, "null"], description: "저장된 user turn 의 메시지 id(work 내 0-based 위치). 동시중복(in_flight) 재-ack 면 null." }

    MessageReply:
      name: MessageReply
      title: 응대 완료 답장
      summary: 응대(support 채널) 완료 시 CM의 최신 assistant 메시지 snapshot. 요청 합치기(coalescing) 때문에 inbound 메시지와 1:1 cardinality를 보장하지 않는다(그래서 correlation_id 는 싣지 않는다 — id 로 식별).
      contentType: application/json
      payload:
        allOf:
          - $ref: "#/components/schemas/EnvelopeBase"
          - type: object
            properties:
              type: { const: message.reply }
              data:
                type: object
                additionalProperties: false
                properties:
                  id: { type: [integer, "null"], description: "답장 assistant turn 의 메시지 id(work 내 0-based 위치). history·커서와 동일 어휘." }
                  text: { type: [string, "null"] }

    WorkProgress:
      name: WorkProgress
      title: 진행 표시 (작업 단계 시작 시 step 문구)
      summary: 각 작업 단계 시작 시 그 단계의 사용자 문구 + channel(lane). 전 채널 공통 차원이라 work.* 도메인. Nexus 는 순수 전달.
      contentType: application/json
      payload:
        allOf:
          - $ref: "#/components/schemas/EnvelopeBase"
          - type: object
            properties:
              type: { const: work.progress }
              data:
                type: object
                required: [display_status, channel]
                additionalProperties: false
                properties:
                  display_status:
                    $ref: "#/components/schemas/DisplayStatus"
                  channel:
                    $ref: "#/components/schemas/Channel"
                  phase:
                    { type: [string, "null"], description: 사람-친화 단계 라벨 (선택·예약) }

    WorkFailed:
      name: WorkFailed
      title: work 처리 실패
      summary: work 처리 실패 알림 — (user,work) broadcast. 사용자 안전 메시지(내부 예외·식별자 비노출). 정상 시나리오 아님.
      contentType: application/json
      payload:
        allOf:
          - $ref: "#/components/schemas/EnvelopeBase"
          - type: object
            properties:
              type: { const: work.failed }
              data:
                type: object
                required: [message]
                additionalProperties: false
                properties:
                  message: { type: string }
                  channel: { type: [string, "null"] }

    ModelMaturity:
      name: ModelMaturity
      title: 구체화 완성도(CMM) 갱신 — Nexus 생성
      summary: analysis 채널 작업 완료 시 Nexus 가 CM 에서 fetch 해 push. 정확히 3키(overall_score/scores/weights), 추가 필드 불가(잠금).
      contentType: application/json
      payload:
        allOf:
          - $ref: "#/components/schemas/EnvelopeBase"
          - type: object
            properties:
              type: { const: model.maturity }
              data:
                type: object
                required: [overall_score, scores]
                additionalProperties: false
                properties:
                  overall_score: { type: number, minimum: 0, maximum: 1 }
                  scores:
                    type: object
                    required: [clarity, completeness, potential]
                    additionalProperties: false
                    properties:
                      clarity: { type: number, minimum: 0, maximum: 1 }
                      completeness: { type: number, minimum: 0, maximum: 1 }
                      potential: { type: number, minimum: 0, maximum: 1 }
                  weights:
                    type: object
                    additionalProperties: false
                    properties:
                      clarity: { type: number, minimum: 0, maximum: 1 }
                      completeness: { type: number, minimum: 0, maximum: 1 }
                      potential: { type: number, minimum: 0, maximum: 1 }

    ModelRoadmap:
      name: ModelRoadmap
      title: 로드맵 갱신 신호 — Nexus 생성
      summary: analysis 채널 작업 완료 시 Nexus push. 클라이언트가 GET /api/v1/works/{id}/estimate/roadmap 으로 fresh fetch
      contentType: application/json
      payload:
        allOf:
          - $ref: "#/components/schemas/EnvelopeBase"
          - type: object
            properties:
              type: { const: model.roadmap }
              data:
                type: object
                additionalProperties: false
                properties:
                  count: { type: integer, minimum: 0 }

    OutputReady:
      name: OutputReady
      title: 출원서 빌드 완료
      contentType: application/json
      payload:
        allOf:
          - $ref: "#/components/schemas/EnvelopeBase"
          - type: object
            properties:
              type: { const: output.ready }
              data:
                type: object
                required: [document_id, filename, size_bytes]
                additionalProperties: false
                properties:
                  document_id: { type: string }
                  filename: { type: string }
                  size_bytes: { type: integer, minimum: 0 }
                  preview_url: { type: [string, "null"] }
                  download_url: { type: [string, "null"] }

    SystemResyncRequired:
      name: SystemResyncRequired
      title: replay buffer evict / 빈 버퍼 재연결 / seq reset 알림
      summary: 클라이언트가 REST 로 전체 상태 재조회 (GET /messages, /roadmap, /maturity)
      contentType: application/json
      payload:
        allOf:
          - $ref: "#/components/schemas/EnvelopeBase"
          - type: object
            properties:
              type: { const: system.resync_required }
              data:
                type: object
                required: [reason]
                additionalProperties: false
                properties:
                  reason: { type: string }

    SystemError:
      name: SystemError
      title: 입력 오류 (잘못된 inbound action / invalid JSON 등)
      summary: 잘못된 inbound 프레임에 대한 응답 — 보낸 소켓에만(unicast). work 처리 실패는 별개(work.failed).
      contentType: application/json
      payload:
        allOf:
          - $ref: "#/components/schemas/EnvelopeBase"
          - type: object
            properties:
              type: { const: system.error }
              data:
                $ref: "#/components/schemas/ErrorBody"

    # ============================================================
    # Inbound (client → server) — action-based JSON frame
    # ============================================================
    ActionMessageSend:
      name: ActionMessageSend
      title: 사용자 메시지 송신 (자유 텍스트, 멱등)
      summary: 텍스트 메시지. 클라가 메시지마다 고유 correlation_id(UUID)를 부여 — 재시도는 같은 correlation_id 로 재송신하면 서버가 멱등 dedup(새 turn/spawn 0, 원결과 재-ack). 같은 id·다른 content 는 system.error(conflict). 미디어는 메시지와 무관 — work 레벨 presigned S3 직접(REST /media/*).
      contentType: application/json
      payload:
        type: object
        required: [action, data]
        additionalProperties: false
        properties:
          action:
            type: string
            const: message.send
          data:
            type: object
            required: [content, correlation_id]
            additionalProperties: false
            properties:
              content:
                type: string
              correlation_id:
                type: string
                description: "클라 생성 멱등키(메시지당 고유, 예 UUID). 재시도는 동일 값으로 재send. 범위 = work."
